<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Witch's Enchanted Garden</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #050208; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(180,140,200,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(160,120,180,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🌙 WITCH'S ENCHANTED GARDEN 🌿</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050208);
scene.fog = new THREE.FogExp2(0x050208, 0.018);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 300);
camera.position.set(0, 8, 28);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.1;
controls.maxPolarAngle = Math.PI * 0.6;
controls.minDistance = 5;
controls.maxDistance = 50;

const composer = new EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
composer.addPass(new THREE.UnrealBloomPass(new THREE.Vector2(innerWidth, innerHeight), 1.2, 0.4, 0.08));

scene.add(new THREE.AmbientLight(0x1a0a20, 0.3));

// Starlit sky
{
  const starCount = 3000;
  const pos = new Float32Array(starCount * 3);
  for (let i = 0; i < starCount; i++) {
    const theta = Math.random() * Math.PI * 2;
    const r = 100 + Math.random() * 50;
    pos[i*3] = Math.cos(theta) * r;
    pos[i*3+1] = 20 + Math.random() * 60;
    pos[i*3+2] = Math.sin(theta) * r;
  }
  const starGeo = new THREE.BufferGeometry();
  starGeo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.5, sizeAttenuation: true })));
}

// Moon
const moon = new THREE.Mesh(new THREE.SphereGeometry(4, 24, 24), new THREE.MeshStandardMaterial({ color: 0xe8e4cc, emissive: 0xaaa888, emissiveIntensity: 0.2, roughness: 0.9 }));
moon.position.set(30, 40, -50);
scene.add(moon);

// Ground with mystical grass
{
  const groundGeo = new THREE.PlaneGeometry(60, 60, 60, 60);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0x1a1a10, roughness: 0.95 });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);
  
  // Grass blades
  for (let g = 0; g < 500; g++) {
    const x = (Math.random() - 0.5) * 50;
    const z = (Math.random() - 0.5) * 50;
    const grassMat = new THREE.MeshStandardMaterial({ color: 0x2a4a20, roughness: 0.9, emissive: 0x1a3010, emissiveIntensity: 0.1 });
    const grass = new THREE.Mesh(new THREE.ConeGeometry(0.03, 0.3 + Math.random() * 0.2, 4), grassMat);
    grass.position.set(x, 0.15, z);
    scene.add(grass);
  }
}

// Glowing potion bottles
function makePotionBottle(x, z, color, scale) {
  const group = new THREE.Group();
  
  // Bottle body
  const glassMat = new THREE.MeshPhysicalMaterial({ color: color, transmission: 0.7, thickness: 1, roughness: 0.05 });
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.3 * scale, 12, 8), glassMat);
  body.scale.y = 1.5;
  group.add(body);
  
  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.1 * scale, 0.15 * scale, 0.3 * scale, 8), glassMat);
  neck.position.y = 0.5 * scale;
  group.add(neck);
  
  // Cork
  const cork = new THREE.Mesh(new THREE.CylinderGeometry(0.08 * scale, 0.08 * scale, 0.15 * scale, 6), new THREE.MeshStandardMaterial({ color: 0x6a4a20 }));
  cork.position.y = 0.72 * scale;
  group.add(cork);
  
  // Glow
  const glow = new THREE.PointLight(color, 1.5, 3 * scale);
  glow.position.y = 0;
  group.add(glow);
  
  group.position.set(x, 0.6 * scale, z);
  return group;
}

// Potion garden
const potionColors = [0x00ff88, 0xff4488, 0x8844ff, 0xffaa00, 0x00aaff, 0xff4488, 0xaa00ff];
for (let i = 0; i < 12; i++) {
  const angle = (i / 12) * Math.PI * 2;
  const r = 4 + (i % 3) * 2;
  scene.add(makePotionBottle(Math.cos(angle) * r, Math.sin(angle) * r, potionColors[i % potionColors.length], 0.8 + (i % 3) * 0.3));
}

// Magic crystal ball
{
  const ballGroup = new THREE.Group();
  
  // Crystal ball
  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(1.5, 24, 16),
    new THREE.MeshPhysicalMaterial({ color: 0x4488aa, transmission: 0.9, thickness: 3, roughness: 0.02, metalness: 0.0 })
  );
  ball.position.y = 1.5;
  ballGroup.add(ball);
  
  // Inner glow
  const inner = new THREE.Mesh(new THREE.SphereGeometry(1.3, 24, 16), new THREE.MeshStandardMaterial({ color: 0x88ccff, emissive: 0x4466aa, emissiveIntensity: 0.8 }));
  inner.position.y = 1.5;
  ballGroup.add(inner);
  
  // Pedestal
  const pedestal = new THREE.Mesh(new THREE.CylinderGeometry(0.8, 1.2, 1.5, 8), new THREE.MeshStandardMaterial({ color: 0x2a2a30, roughness: 0.9 }));
  pedestal.position.y = -0.75;
  ballGroup.add(pedestal);
  
  // Mystical swirl inside
  const swirlMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      uniform float uTime;
      varying vec2 vUv;
      void main() {
        vec2 center = vUv - 0.5;
        float d = length(center);
        float swirl = sin(atan(center.y, center.x) * 5.0 + d * 20.0 - uTime * 2.0) * 0.5 + 0.5;
        vec3 col = mix(vec3(0.2, 0.3, 0.5), vec3(0.4, 0.6, 1.0), swirl);
        float alpha = (1.0 - smoothstep(0.3, 0.5, d)) * swirl * 0.7;
        gl_FragColor = vec4(col, alpha);
      }
    `,
    transparent: true
  });
  const swirl = new THREE.Mesh(new THREE.CircleGeometry(1.2, 32), swirlMat);
  swirl.rotation.x = -Math.PI / 2;
  swirl.position.y = 1.5;
  swirl.userData.isSwirl = true;
  ballGroup.add(swirl);
  
  const ballLight = new THREE.PointLight(0x4488ff, 2, 8);
  ballLight.position.y = 1.5;
  ballGroup.add(ballLight);
  
  scene.add(ballGroup);
}

// Enchanted tree
{
  const treeGroup = new THREE.Group();
  
  // Trunk
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.5, 4, 8), new THREE.MeshStandardMaterial({ color: 0x2a1510, roughness: 0.95 }));
  trunk.position.y = 2;
  treeGroup.add(trunk);
  
  // Glowing leaves
  const leafColors = [0x8844ff, 0xff4488, 0x44ffaa];
  for (let l = 0; l < 40; l++) {
    const angle = Math.random() * Math.PI * 2;
    const r = 1 + Math.random() * 2;
    const leafMat = new THREE.MeshStandardMaterial({ 
      color: leafColors[Math.floor(Math.random() * leafColors.length)], 
      roughness: 0.8, 
      emissive: leafColors[Math.floor(Math.random() * leafColors.length)],
      emissiveIntensity: 0.5
    });
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.2 + Math.random() * 0.3, 8, 6), leafMat);
    leaf.position.set(Math.cos(angle) * r, 4 + Math.random() * 2, Math.sin(angle) * r);
    treeGroup.add(leaf);
  }
  
  // Hanging lanterns
  for (let h = 0; h < 5; h++) {
    const angle = (h / 5) * Math.PI * 2;
    const lantern = new THREE.Mesh(new THREE.SphereGeometry(0.2, 8, 8), new THREE.MeshStandardMaterial({ color: 0xffaa44, emissive: 0xff8800, emissiveIntensity: 2.0 }));
    lantern.position.set(Math.cos(angle) * 2, 3 + h * 0.3, Math.sin(angle) * 2);
    treeGroup.add(lantern);
    
    const lanternLight = new THREE.PointLight(0xffaa44, 1, 4);
    lanternLight.position.copy(lantern.position);
    treeGroup.add(lanternLight);
  }
  
  treeGroup.position.set(-8, 0, -5);
  scene.add(treeGroup);
}

// Stone path
for (let i = 0; i < 15; i++) {
  const t = i / 14;
  const stone = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4 + Math.random() * 0.2, 0.5 + Math.random() * 0.2, 0.15, 8),
    new THREE.MeshStandardMaterial({ color: 0x4a4a48, roughness: 0.9 })
  );
  stone.position.set(-10 + t * 20, 0.08, -10 + t * 15 + Math.sin(t * Math.PI) * 2);
  scene.add(stone);
}

// Fireflies
{
  const ffCount = 80;
  const ffPos = new Float32Array(ffCount * 3);
  const ffPhases = new Float32Array(ffCount);
  for (let i = 0; i < ffCount; i++) {
    ffPos[i*3] = (Math.random() - 0.5) * 50;
    ffPos[i*3+1] = 1 + Math.random() * 8;
    ffPos[i*3+2] = (Math.random() - 0.5) * 50;
    ffPhases[i] = Math.random() * Math.PI * 2;
  }
  const ffGeo = new THREE.BufferGeometry();
  ffGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3));
  const ffMat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `uniform float uTime; void main() { gl_PointSize = 8.0; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `uniform float uTime; void main() { float d = length(gl_PointCoord - 0.5); if (d > 0.5) discard; float a = 1.0 - d * 2.0; vec3 col = vec3(0.8, 1.0, 0.4); gl_FragColor = vec4(col, a * 0.9); }`,
    transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
  });
  const fireflies = new THREE.Points(ffGeo, ffMat);
  fireflies.userData.phases = ffPhases;
  fireflies.userData.positions = ffPos;
  fireflies.userData.isFireflies = true;
  scene.add(fireflies);
}

// Garden shed
{
  const shedGroup = new THREE.Group();
  
  // Walls
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x3a2a1a, roughness: 0.9 });
  shedGroup.add(new THREE.Mesh(new THREE.BoxGeometry(4, 3, 3), wallMat));
  
  // Roof
  const roofMat = new THREE.MeshStandardMaterial({ color: 0x2a1a0a, roughness: 0.95 });
  const roof = new THREE.Mesh(new THREE.ConeGeometry(3.2, 2, 4), roofMat);
  roof.position.y = 2.5;
  roof.rotation.y = Math.PI / 4;
  shedGroup.add(roof);
  
  // Door
  const door = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.8, 0.1), new THREE.MeshStandardMaterial({ color: 0x4a3020 }));
  door.position.set(0, -0.6, 1.56);
  shedGroup.add(door);
  
  // Window with glow
  const win = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.1), new THREE.MeshStandardMaterial({ color: 0xffcc44, emissive: 0xff8800, emissiveIntensity: 1.0 }));
  win.position.set(0, 0.5, 1.56);
  shedGroup.add(win);
  
  // Cauldron outside
  const cauldron = new THREE.Mesh(new THREE.SphereGeometry(0.8, 12, 8), new THREE.MeshStandardMaterial({ color: 0x1a1a1a, roughness: 0.7 }));
  cauldron.position.set(2, 0.5, 2);
  shedGroup.add(cauldron);
  
  // Bubbling potion glow
  const potionGlow = new THREE.PointLight(0x00ff88, 1.5, 5);
  potionGlow.position.set(2, 1.2, 2);
  shedGroup.add(potionGlow);
  
  shedGroup.position.set(8, 1.5, -8);
  scene.add(shedGroup);
}

// Mystical runes on ground
const runeSymbols = ['*', 'o', '+', 'x', '~'];
for (let r = 0; r < 8; r++) {
  const angle = (r / 8) * Math.PI * 2;
  const runeMat = new THREE.MeshStandardMaterial({ color: 0xaa44ff, emissive: 0x8822ff, emissiveIntensity: 1.5 });
  const rune = new THREE.Mesh(new THREE.RingGeometry(0.3, 0.4, 6), runeMat);
  rune.rotation.x = -Math.PI / 2;
  rune.position.set(Math.cos(angle) * 12, 0.02, Math.sin(angle) * 12);
  scene.add(rune);
}

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  scene.traverse(obj => {
    if (obj.userData.isFireflies) {
      const pos = obj.userData.positions;
      const phases = obj.userData.phases;
      for (let i = 0; i < pos.length / 3; i++) {
        pos[i*3] += Math.sin(t * 0.7 + phases[i]) * 0.008;
        pos[i*3+1] += Math.sin(t * 1.1 + phases[i]) * 0.004;
        pos[i*3+2] += Math.cos(t * 0.7 + phases[i]) * 0.008;
      }
      obj.geometry.attributes.position.needsUpdate = true;
      obj.material.uniforms.uTime.value = t;
    }
    if (obj.userData.isSwirl && obj.material?.uniforms?.uTime) obj.material.uniforms.uTime.value = t;
  });
  
  controls.update();
  composer.render();
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
  composer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
